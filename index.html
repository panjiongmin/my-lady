<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的恋爱小站</title>
    <meta name="description" content="记录属于你们的相遇、陪伴、纪念日与心动时刻。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero" id="hero">
            <div class="hero__backdrop"></div>
            <div class="hero__decor hero__decor--top-left">
                <span class="sticker sticker--cloud"></span>
                <span class="sticker sticker--bow"></span>
            </div>
            <div class="hero__decor hero__decor--top-right">
                <span class="sticker sticker--star"></span>
                <span class="sticker sticker--heart"></span>
            </div>
            <div class="hero__decor hero__decor--bottom">
                <span class="sticker sticker--ribbon"></span>
                <span class="sticker sticker--cloud small"></span>
                <span class="sticker sticker--star small"></span>
            </div>
            <div class="hero__content">
                <p class="eyebrow" id="hero-badge"></p>
                <h1 id="hero-title"></h1>
                <p class="hero__subtitle" id="hero-subtitle"></p>
                <p class="hero__description" id="hero-description"></p>
                <div class="hero__actions">
                    <a class="button button--primary" href="#timeline">翻看回忆</a>
                </div>
                <div class="hero__meta">
                    <article class="person-card">
                        <img id="person-a-image" alt="恋人 A">
                        <div>
                            <span>男主角</span>
                            <strong id="person-a-name"></strong>
                        </div>
                    </article>
                    <div class="hero__heart" aria-hidden="true">LOVE</div>
                    <article class="person-card">
                        <img id="person-b-image" alt="恋人 B">
                        <div>
                            <span>女主角</span>
                            <strong id="person-b-name"></strong>
                        </div>
                    </article>
                </div>
            </div>
            <div class="hero__mascot-strip" aria-hidden="true">
                <span class="mascot-pill">bow</span>
                <span class="mascot-pill">cloud</span>
                <span class="mascot-pill">heart</span>
                <span class="mascot-pill">sweet</span>
            </div>
        </header>

        <main>
            <section class="section section--counter">
                <div class="section__ornament section__ornament--left"></div>
                <div class="section-heading">
                    <p class="eyebrow">TIME TOGETHER</p>
                    <h2 id="counter-title"></h2>
                    <p id="counter-description"></p>
                </div>
                <div class="counter-grid">
                    <article class="counter-card"><span id="days-value">0</span><p>天</p></article>
                    <article class="counter-card"><span id="hours-value">0</span><p>小时</p></article>
                    <article class="counter-card"><span id="minutes-value">0</span><p>分钟</p></article>
                    <article class="counter-card"><span id="seconds-value">0</span><p>秒</p></article>
                </div>
            </section>

            <section class="section" id="timeline">
                <div class="section__ornament section__ornament--right"></div>
                <div class="section-heading">
                    <p class="eyebrow">OUR STORY</p>
                    <h2 id="timeline-title"></h2>
                    <p id="timeline-description"></p>
                </div>
                <div class="timeline" id="timeline-list"></div>
            </section>

            <section class="section section--gallery" id="gallery">
                <div class="section__ornament section__ornament--left soft"></div>
                <div class="section-heading">
                    <p class="eyebrow">MEMORIES</p>
                    <h2 id="gallery-title"></h2>
                    <p id="gallery-description"></p>
                </div>
                <div class="gallery-grid" id="gallery-list"></div>
            </section>

            <section class="section section--notes" id="notes">
                <div class="section__ornament section__ornament--right soft"></div>
                <div class="section-heading">
                    <p class="eyebrow">LOVE NOTES</p>
                    <h2 id="notes-title"></h2>
                    <p id="notes-description"></p>
                </div>
                <div class="notes-grid" id="notes-list"></div>
            </section>
        </main>

        <footer class="footer">
            <p id="footer-text"></p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
    <script src="js/site-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
