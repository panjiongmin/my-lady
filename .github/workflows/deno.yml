name: Deno Checks

on:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x

      - name: Format Check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Test
        run: deno task test
