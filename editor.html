<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱小站编辑器</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="editor-page-body">
    <main class="editor-page">
        <section class="editor-page__hero">
            <p class="eyebrow">专属编辑页</p>
            <h1>恋爱小站编辑器</h1>
            <p>你可以在这里修改文字和图片，先保存到本地，也可以生成分享链接；如果想让部署页对所有人同步生效，请导出 JSON 后覆盖仓库里的 <code>data/site-content.json</code> 并提交。</p>
            <div class="editor-page__actions">
                <a class="button button--primary" href="./index.html">打开主页</a>
                <button class="button button--ghost" id="copy-share-link" type="button">复制分享链接</button>
            </div>
            <p class="editor-page__hint" id="share-status">默认只保存在当前浏览器里。如果想让对方看到同样的文字和图片，请把分享链接发给对方。</p>
        </section>

        <section class="editor-page__panel">
            <form class="editor-page__form" id="editor-form">
                <section class="editor-group">
                    <h3>基础信息</h3>
                    <label>站点标题<input id="site-title-input" name="siteTitle" type="text"></label>
                    <label>头图角标<input id="hero-badge-input" name="heroBadge" type="text"></label>
                    <label>头图标题<input id="hero-title-input" name="heroTitle" type="text"></label>
                    <label>头图副标题<textarea id="hero-subtitle-input" name="heroSubtitle" rows="3"></textarea></label>
                    <label>头图说明<textarea id="hero-description-input" name="heroDescription" rows="5"></textarea></label>
                    <label>在一起日期<input id="anniversary-input" name="anniversaryDate" type="datetime-local"></label>
                    <label>页脚文案<input id="footer-text-input" name="footerText" type="text"></label>
                </section>

                <section class="editor-group">
                    <h3>人物与封面</h3>
                    <label>左侧名字<input id="person-a-name-input" name="personAName" type="text"></label>
                    <label>左侧头像链接<input id="person-a-image-input" name="personAImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传左侧头像<input id="person-a-upload-input" accept="image/*" type="file"></label>
                    <label>右侧名字<input id="person-b-name-input" name="personBName" type="text"></label>
                    <label>右侧头像链接<input id="person-b-image-input" name="personBImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传右侧头像<input id="person-b-upload-input" accept="image/*" type="file"></label>
                    <label>头图背景链接<input id="hero-image-input" name="heroImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传头图背景<input id="hero-upload-input" accept="image/*" type="file"></label>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>时间线</h3>
                        <button class="button button--small" id="add-timeline-item" type="button">新增事件</button>
                    </div>
                    <div class="repeat-list" id="timeline-editor-list"></div>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>相册</h3>
                        <button class="button button--small" id="add-gallery-item" type="button">新增照片</button>
                    </div>
                    <div class="repeat-list" id="gallery-editor-list"></div>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>留言卡</h3>
                        <button class="button button--small" id="add-note-item" type="button">新增留言</button>
                    </div>
                    <div class="repeat-list" id="note-editor-list"></div>
                </section>
            </form>

            <div class="editor-page__footer">
                <div class="editor__tools">
                    <button class="button button--ghost editor-page__ghost" id="export-json" type="button">导出 JSON</button>
                    <label class="button button--ghost file-button editor-page__ghost" for="import-json">导入 JSON</label>
                    <input class="hidden-input" id="import-json" accept="application/json" type="file">
                    <button class="button button--ghost editor-page__ghost" id="reset-content" type="button">恢复默认</button>
                </div>
                <button class="button button--primary editor-page__save" id="save-editor" type="button">保存内容</button>
            </div>
        </section>
    </main>

    <template id="timeline-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>时间线事件</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>日期<input data-field="date" type="text" placeholder="2026.04.16"></label>
            <label>标题<input data-field="title" type="text" placeholder="第一次正式约会"></label>
            <label>描述<textarea data-field="description" rows="3" placeholder="写下这一天发生了什么"></textarea></label>
        </article>
    </template>

    <template id="gallery-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>相册项目</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>标题<input data-field="title" type="text" placeholder="海边的夜晚"></label>
            <label>描述<textarea data-field="description" rows="2" placeholder="写下这张照片背后的故事"></textarea></label>
            <label>图片链接<input data-field="image" type="url" placeholder="https://..."></label>
            <label class="upload-field">上传图片<input data-field="upload" accept="image/*" type="file"></label>
        </article>
    </template>

    <template id="note-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>留言卡片</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>标题<input data-field="title" type="text" placeholder="想对你说的话"></label>
            <label>内容<textarea data-field="content" rows="4" placeholder="把想说的话写在这里"></textarea></label>
        </article>
    </template>

    <script src="js/site-data.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
