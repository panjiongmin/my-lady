<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑恋爱小站</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Noto+Serif+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="editor-page-body">
    <main class="editor-page">
        <section class="editor-page__hero">
            <p class="eyebrow">PRIVATE EDITOR</p>
            <h1>编辑情侣小站</h1>
            <p>这里现在会优先连接 Supabase。你保存文字、上传图片后，对方打开首页就能直接看到最新内容。</p>
            <div class="editor-page__actions">
                <a class="button button--primary" href="./index.html">打开首页</a>
                <button class="button button--ghost" id="copy-share-link" type="button">复制分享链接</button>
                <button class="button button--ghost hidden" id="editor-logout-button" type="button">退出登录</button>
            </div>
            <p class="editor-page__hint" id="cloud-hint">正在检查 Supabase 配置...</p>
            <p class="editor-page__hint" id="share-status">你也可以继续用分享链接把当前内容单独发给对方。</p>
            <p class="editor-page__hint" id="editor-auth-status">正在检查登录状态...</p>
        </section>

        <section class="editor-page__panel hidden" id="editor-login-panel">
            <div class="editor-login">
                <p class="eyebrow">LOGIN REQUIRED</p>
                <h2>先登录再编辑</h2>
                <p>这个编辑页只开放给情侣双方账号。登录状态会保存在当前浏览器里，之后打开会自动保持。</p>
                <form class="auth-form" id="editor-auth-form">
                    <label>用户名<input id="editor-auth-username" autocomplete="username" type="text" required></label>
                    <label>密码<input id="editor-auth-password" autocomplete="current-password" type="password" required></label>
                    <p class="auth-form__status" id="editor-auth-form-status"></p>
                    <button class="button button--primary" type="submit">登录并进入编辑页</button>
                </form>
            </div>
        </section>

        <section class="editor-page__panel hidden" id="editor-content-panel">
            <form class="editor-page__form" id="editor-form">
                <section class="editor-group">
                    <h3>基础信息</h3>
                    <label>网站标题<input id="site-title-input" name="siteTitle" type="text"></label>
                    <label>开场标签<input id="hero-badge-input" name="heroBadge" type="text"></label>
                    <label>开场主标题<input id="hero-title-input" name="heroTitle" type="text"></label>
                    <label>开场副标题<textarea id="hero-subtitle-input" name="heroSubtitle" rows="3"></textarea></label>
                    <label>开场介绍<textarea id="hero-description-input" name="heroDescription" rows="5"></textarea></label>
                    <label>在一起日期<input id="anniversary-input" name="anniversaryDate" type="datetime-local"></label>
                    <label>页脚文案<input id="footer-text-input" name="footerText" type="text"></label>
                </section>

                <section class="editor-group">
                    <h3>人物与封面</h3>
                    <label>左侧名字<input id="person-a-name-input" name="personAName" type="text"></label>
                    <label>左侧头像链接<input id="person-a-image-input" name="personAImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传左侧头像<input id="person-a-upload-input" accept="image/*" type="file"></label>
                    <label>右侧名字<input id="person-b-name-input" name="personBName" type="text"></label>
                    <label>右侧头像链接<input id="person-b-image-input" name="personBImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传右侧头像<input id="person-b-upload-input" accept="image/*" type="file"></label>
                    <label>封面背景图链接<input id="hero-image-input" name="heroImage" type="url" placeholder="https://..."></label>
                    <label class="upload-field">上传封面背景图<input id="hero-upload-input" accept="image/*" type="file"></label>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>时间线</h3>
                        <button class="button button--small" id="add-timeline-item" type="button">新增事件</button>
                    </div>
                    <div class="repeat-list" id="timeline-editor-list"></div>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>相册</h3>
                        <button class="button button--small" id="add-gallery-item" type="button">新增照片</button>
                    </div>
                    <div class="repeat-list" id="gallery-editor-list"></div>
                </section>

                <section class="editor-group">
                    <div class="editor-group__head">
                        <h3>短笺</h3>
                        <button class="button button--small" id="add-note-item" type="button">新增卡片</button>
                    </div>
                    <div class="repeat-list" id="note-editor-list"></div>
                </section>
            </form>

            <div class="editor-page__footer">
                <div class="editor__tools">
                    <button class="button button--ghost editor-page__ghost" id="export-json" type="button">导出 JSON</button>
                    <label class="button button--ghost file-button editor-page__ghost" for="import-json">导入 JSON</label>
                    <input class="hidden-input" id="import-json" accept="application/json" type="file">
                    <button class="button button--ghost editor-page__ghost" id="reset-content" type="button">恢复默认</button>
                </div>
                <button class="button button--primary editor-page__save" id="save-editor" type="button">保存到云端</button>
            </div>
        </section>
    </main>

    <template id="timeline-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>时间线事件</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>日期<input data-field="date" type="text" placeholder="2026.04.16"></label>
            <label>标题<input data-field="title" type="text" placeholder="第一次约会"></label>
            <label>描述<textarea data-field="description" rows="3" placeholder="记录这一天发生了什么"></textarea></label>
        </article>
    </template>

    <template id="gallery-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>相册项目</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>标题<input data-field="title" type="text" placeholder="海边晚风"></label>
            <label>描述<textarea data-field="description" rows="2" placeholder="这张照片背后的故事"></textarea></label>
            <label>图片链接<input data-field="image" type="url" placeholder="https://..."></label>
            <label class="upload-field">上传图片<input data-field="upload" accept="image/*" type="file"></label>
        </article>
    </template>

    <template id="note-editor-template">
        <article class="repeat-card">
            <div class="repeat-card__head">
                <strong>短笺卡片</strong>
                <button class="link-button" data-action="remove" type="button">删除</button>
            </div>
            <label>小标题<input data-field="title" type="text" placeholder="想对你说"></label>
            <label>内容<textarea data-field="content" rows="4" placeholder="写下一段想说的话"></textarea></label>
        </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth-config.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/supabase-service.js"></script>
    <script src="js/site-data.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
